name: Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libgles2-mesa-dev
        pip install --upgrade pip
        pip install Cython==0.29.36 buildozer

    - name: Build APK with Buildozer
      run: |
        # Auto-accept Android SDK licenses during compilation
        yes | buildozer -v android debug
        
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Red-Game-APK
        path: bin/*.apk
